# Configuration
font_family                 JetBrainsMono Nerd Font
font_size                   13
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
remember_window_size        no
initial_window_width        1850
initial_window_height       1200
cursor_blink_interval       0.5
#cursor_stop_blinking_after  1
scrollback_lines            4000
wheel_scroll_min_lines      1
enable_audio_bell           no
window_padding_width        20
hide_window_decorations     no
background_opacity          0.9
dynamic_background_opacity  yes
confirm_os_window_close     0
selection_foreground        none
selection_background        none

# Animated cursor follows text
include $HOME/.config/kitty/kitty-cursor-trail.conf

# Include wallpaper colors
include colors-matugen.conf

# Include Custom Configuration
# Create the file custom.conf in ~/.config/kitty to overwrite the default configuration
include ./custom.conf



shell /usr/bin/fish



# --- SPLITS EN KITTY ---

# Dividir pantalla
map ctrl+shift+h launch --location=hsplit   
map ctrl+shift+v launch --location=vsplit   

# Navegar entre splits
map ctrl+shift+left  neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up    neighboring_window up
map ctrl+shift+down  neighboring_window down

# Redimensionar splits
map ctrl+shift+alt+left  resize_window narrower
map ctrl+shift+alt+right resize_window wider
map ctrl+shift+alt+up    resize_window taller
map ctrl+shift+alt+down  resize_window shorter

# Cerrar split activo
map ctrl+shift+w close_window


drag_and_drop_input yes

map ctrl+shift+v paste_from_clipboard

kitty +kitten clipboard --paste


map ctrl+alt+v launch --type=overlay kitty +kitten clipboard --paste




include theme.conf
