#######################
### LOOK AND FEEL   ###
#######################

# Configuración General (Espacios, Bordes, Layout)
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(89b4faff) rgba(cba6f7ff) 45deg
    col.inactive_border = rgba(313244aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# Decoración (Esquinas, Opacidad, Sombras, Blur)
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a2ecc)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.2
    }
}

# XWayland — renderizado 1:1 sin escalado fraccional (mejora fonts en apps X11)
xwayland {
    force_zero_scaling = true
}

# Animaciones
animations {
    enabled = true
    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, easeOut, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, linear, loop
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, overshot, slidevert

    animation = hyprfocusIn,  1, 1, default
    animation = hyprfocusOut, 1, 1, default
}
