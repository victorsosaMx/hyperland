####################
### KEYBINDINGS  ###
####################

# Variables para Atajos
$mod = SUPER
$terminal = kitty
$filemanager = dolphin
$launcher = rofi -show drun -theme ~/.config/rofi/spotlight.rasi
$launchpad = rofi -show drun -theme ~/.config/rofi/launchpad.rasi

# --- Básicos ---
bind = $mod, Return, exec, $terminal
bind = $mod, E, exec, $filemanager
bind = $mod, Space, exec, $launchpad
bind = $mod, A,     exec, $launcher
bind = $mod, Q, killactive
bind = ALT, F4, killactive
bind = ALT, Tab, exec, ~/.config/hyprswitch/launch.sh
bind = $mod SHIFT, M, exit
bind = $mod, F, fullscreen
bind = $mod SHIFT, Space, togglefloating
bind = $mod, P, pseudo
bind = $mod, T, togglesplit

# --- Foco y Ventanas ---
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# --- Redimensionar ---
binde = $mod CTRL, left,  resizeactive, -50 0
binde = $mod CTRL, right, resizeactive,  50 0
binde = $mod CTRL, up,    resizeactive,  0 -50
binde = $mod CTRL, down,  resizeactive,  0  50

# --- Espacios de Trabajo (Workspaces) ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Utilidades y Herramientas ---
bind = , Print,      exec, bash -c 'grim -g "$(slurp)" - | wl-copy'
bind = SHIFT, Print, exec, bash -c 'grim "$HOME/Imágenes/screenshot-$(date +%Y%m%d-%H%M%S).png" && notify-send "Screenshot" "Guardado en ~/Imágenes"'
bind = CTRL, Print,  exec, bash -c 'grim - | wl-copy'
bind = SUPER SHIFT, Print, exec, bash -c 'grim -g "$(slurp)" - | swappy -f -'

bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod, Tab, hyprexpo:expo, toggle

# --- Salida y Bloqueo ---
bind = $mod, Delete, exec, hyprlock
bind = $mod, L, exec, hyprlock
bind = $mod, F1, exec, ~/.local/bin/theme-picker
bind = $mod, W, exec, ~/.local/bin/wallpaper-picker
bind = $mod SHIFT, E, exec, wlogout -b 3 -c 20 -r 20 -L 400 -R 400 -T 200 -B 200 --protocol layer-shell

# --- Multimedia ---
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute,        exec, pamixer -t
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
